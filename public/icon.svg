<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!-- Background -->
  <rect width="512" height="512" fill="#0a0f0d" rx="128"/>

  <!-- Gradient definition -->
  <defs>
    <linearGradient id="poolGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 8 Ball Circle -->
  <circle cx="256" cy="256" r="140" fill="url(#poolGradient)" filter="url(#glow)"/>
  <circle cx="256" cy="256" r="120" fill="#1a1a1a"/>

  <!-- Number 8 Circle Background -->
  <circle cx="256" cy="256" r="60" fill="white"/>

  <!-- Number 8 -->
  <text x="256" y="300" font-family="Arial, sans-serif" font-size="90" font-weight="bold" fill="#000000" text-anchor="middle">8</text>

  <!-- Subtle shine effect -->
  <ellipse cx="226" cy="216" rx="30" ry="40" fill="white" opacity="0.3"/>
</svg>
